<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet">
    <link href="style.css" rel="stylesheet">

</head>

<body>

    <div class="header">
        <img src="https://alaqsa.edu.ps/site/MainPage/Resources/img/logo.png" alt="Al-Aqsa University">
        <div class="title-area">
            <h1>Weather App</h1>
        </div>
    </div>

    <div class="main-content">
        <div class="search-panel">
            <!-- Search -->
            <div class="search-area">
                <input type="text" id="cityInput" placeholder="Enter city name (e.g., London, Gaza, Tokyo)..."
                    autocomplete="off">
                <button class="search-btn" id="searchBtn">Search</button>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage"></div>

            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="color:#888;">Fetching weather data...</p>
            </div>

            <!-- Current Weather -->
            <div class="weather-card" id="weatherCard">
                <div class="weather-main">
                    <img class="weather-icon" id="weatherIcon" src="" alt="Weather">
                    <div class="weather-info">
                        <h2 id="cityName">--</h2>
                        <div class="temp"><span id="temperature">--</span>°C</div>
                        <div class="description" id="description">--</div>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <div class="label">Feels Like</div>
                        <div class="value"><span id="feelsLike">--</span>°C</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Humidity</div>
                        <div class="value"><span id="humidity">--</span>%</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Wind Speed</div>
                        <div class="value"><span id="windSpeed">--</span> m/s</div>
                    </div>
                    <div class="detail-item">
                        <div class="label">Pressure</div>
                        <div class="value"><span id="pressure">--</span> hPa</div>
                    </div>
                </div>
            </div>

            <!-- 5-Day Forecast -->
            <div class="forecast-section" id="forecastSection">
                <div class="forecast-title">5-Day Forecast</div>
                <div class="forecast-row" id="forecastRow">
                    <!-- Forecast items will be generated by JS -->
                </div>
            </div>

            <!-- Recent Searches -->
            <div class="recent-section" id="recentSection">
                <div class="recent-title">Recent Searches</div>
                <div class="recent-list" id="recentList">
                    <!-- Recent items will be loaded from localStorage -->
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        Alaa Mousa,Al-Aqsa University
    </div>

    <script src="weather.js"></script>
</body>

</html>
